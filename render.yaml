services:
  - type: web
    name: vels-chatbot-api
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd api && uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.12"
